name: Build CLI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows-x64
            runner: windows-latest
            goos: windows
            goarch: amd64
            binary_name: radiofx.exe
            artifact_name: radiofx-windows-x64
          - name: linux-x64
            runner: ubuntu-latest
            goos: linux
            goarch: amd64
            binary_name: radiofx
            artifact_name: radiofx-linux-x64

    env:
      DIST_DIR: dist/${{ matrix.artifact_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Test
        shell: bash
        run: go test ./...

      - name: Build CLI
        shell: bash
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: go build -o "${DIST_DIR}/${{ matrix.binary_name }}" ./cmd/radiofx

      - name: Copy shared assets
        shell: bash
        run: |
          mkdir -p "${DIST_DIR}/start" "${DIST_DIR}/end"
          cp presets.json "${DIST_DIR}/presets.json"
          cp start/*.wav "${DIST_DIR}/start/"
          cp end/*.wav "${DIST_DIR}/end/"

      - name: Copy Windows wrappers
        if: matrix.goos == 'windows'
        shell: bash
        run: cp windows/*.bat "${DIST_DIR}/"

      - name: Verify artifact layout
        shell: bash
        run: |
          test -f "${DIST_DIR}/${{ matrix.binary_name }}"
          test -f "${DIST_DIR}/presets.json"
          test -d "${DIST_DIR}/start"
          test -d "${DIST_DIR}/end"

          if [ "${{ matrix.goos }}" = "windows" ]; then
            test -f "${DIST_DIR}/clean-radio-filter.bat"
            test -f "${DIST_DIR}/walkie-talkie-filter.bat"
            test -f "${DIST_DIR}/harsh-digital-noise.bat"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ env.DIST_DIR }}
          if-no-files-found: error
