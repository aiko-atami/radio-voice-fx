name: Build CLI

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows-x64
            runner: windows-latest
            goos: windows
            goarch: amd64
            binary_name: radiofx.exe
            artifact_name: radiofx-windows-x64
            release_asset: radiofx-windows-x64.zip
          - name: linux-x64
            runner: ubuntu-latest
            goos: linux
            goarch: amd64
            binary_name: radiofx
            artifact_name: radiofx-linux-x64
            release_asset: radiofx-linux-x64.tar.gz

    env:
      DIST_DIR: dist/${{ matrix.artifact_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.mod

      - name: Test
        shell: bash
        run: go test ./...

      - name: Build CLI
        shell: bash
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: go build -o "${DIST_DIR}/${{ matrix.binary_name }}" ./cmd/radiofx

      - name: Copy shared assets
        shell: bash
        run: |
          mkdir -p "${DIST_DIR}/start" "${DIST_DIR}/end"
          cp presets.json "${DIST_DIR}/presets.json"
          cp start/*.wav "${DIST_DIR}/start/"
          cp end/*.wav "${DIST_DIR}/end/"

      - name: Copy Windows wrappers
        if: matrix.goos == 'windows'
        shell: bash
        run: |
          mkdir -p "${DIST_DIR}/windows"
          cp windows/*.bat "${DIST_DIR}/windows/"

      - name: Verify artifact layout
        shell: bash
        run: |
          test -f "${DIST_DIR}/${{ matrix.binary_name }}"
          test -f "${DIST_DIR}/presets.json"
          test -d "${DIST_DIR}/start"
          test -d "${DIST_DIR}/end"

          if [ "${{ matrix.goos }}" = "windows" ]; then
            test -d "${DIST_DIR}/windows"
            test -f "${DIST_DIR}/windows/clean-radio-filter.bat"
            test -f "${DIST_DIR}/windows/walkie-talkie-filter.bat"
            test -f "${DIST_DIR}/windows/harsh-digital-noise.bat"
          fi

      - name: Package Linux release archive
        if: matrix.goos == 'linux'
        shell: bash
        run: tar -C "${DIST_DIR}" -czf "dist/${{ matrix.release_asset }}" .

      - name: Package Windows release archive
        if: matrix.goos == 'windows'
        shell: pwsh
        run: |
          $archivePath = "dist/${{ matrix.release_asset }}"
          if (Test-Path $archivePath) {
            Remove-Item $archivePath
          }
          Compress-Archive -Path "${{ env.DIST_DIR }}/*" -DestinationPath $archivePath

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/${{ matrix.release_asset }}
          if-no-files-found: error

      - name: Ensure GitHub release exists
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if ! gh release view "${GITHUB_REF_NAME}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            gh release create "${GITHUB_REF_NAME}" \
              --repo "${GITHUB_REPOSITORY}" \
              --title "${GITHUB_REF_NAME}" \
              --verify-tag \
              --generate-notes || \
            gh release view "${GITHUB_REF_NAME}" --repo "${GITHUB_REPOSITORY}" >/dev/null
          fi

      - name: Upload release asset
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${GITHUB_REF_NAME}" \
            "dist/${{ matrix.release_asset }}" \
            --repo "${GITHUB_REPOSITORY}" \
            --clobber
